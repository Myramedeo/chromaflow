# Runs type-checking and linting on every push and pull request.
# Both jobs run in parallel to keep the feedback loop fast.

name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  # ── Job 1: TypeScript type check ────────────────────────────────────────────
  type-check:
    name: Type check
    runs-on: ubuntu-latest
    env:
      # Prisma needs a DATABASE_URL to run `prisma generate`
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL:   ${{ secrets.DATABASE_URL }}
      # Dummy values for env vars that Next.js validates at build time.
      # These are never used, only shape/type matters for tsc --noEmit.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      CLERK_SECRET_KEY:                  sk_test_placeholder
      NEXT_PUBLIC_SUPABASE_URL:          https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY:     placeholder
      STRIPE_SECRET_KEY:                 sk_test_placeholder
      STRIPE_WEBHOOK_SECRET:             whsec_placeholder
      STRIPE_PRO_PRICE_ID:               price_placeholder
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      NEXT_PUBLIC_APP_URL:               http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npm run type-check

  # ── Job 2: ESLint ───────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      DATABASE_URL:                      postgresql://placeholder
      DIRECT_URL:                        postgresql://placeholder
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      CLERK_SECRET_KEY:                  sk_test_placeholder
      NEXT_PUBLIC_SUPABASE_URL:          https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY:     placeholder
      STRIPE_SECRET_KEY:                 sk_test_placeholder
      STRIPE_WEBHOOK_SECRET:             whsec_placeholder
      STRIPE_PRO_PRICE_ID:               price_placeholder
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      NEXT_PUBLIC_APP_URL:               http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint